      // FOUC guard: set data-theme before any stylesheet loads so the first
      // paint uses the right palette. Mirrors hooks/useTheme.ts. The stored
      // value is JSON (usehooks-ts useLocalStorage). When no preference is
      // stored we paint light — the dark-mode flag isn't known until React
      // mounts, and a flag-off user with OS dark mode shouldn't see a dark
      // flash. useTheme's effect corrects this on mount for flag-on users.
      try {
        var raw = localStorage.getItem('om:theme');
        // Mirror useTheme's default: usehooks-ts doesn't persist 'system'
        // until the toggle is used, so absent = 'system' (gated on flagOn).
        var pref = raw ? JSON.parse(raw) : 'system';
        // The flag isn't known at first paint. The hook persists its last
        // known state here so a user whose flag was turned off after picking
        // Dark doesn't see a dark→light flash on every load.
        var flagOn = localStorage.getItem('om:dark-mode-enabled') === '1';
        var dark =
          flagOn &&
          (pref === 'dark' ||
            (pref === 'system' &&
              matchMedia('(prefers-color-scheme: dark)').matches));
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        // Pre-CSS canvas color: until tokens.css loads, the UA paints the
        // default white canvas, which flashes on a dark hard-reload. Inline
        // values mirror tokens.css --om-bg-app; useTheme clears this once
        // the app mounts so the stylesheet owns the background again.
        document.documentElement.style.background = dark
          ? '#1c1b19'
          : '#faf9f5';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.background = '#faf9f5';
      }
    </script>
